name: Go Linter

on:
  push:
    branches-ignore:
      - none
    tags-ignore:
      - '*'
    paths:
      - '**.go'
      - 'go.mod'
      - '.github/workflows/golangci-lint.yml'

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
